services:
  postgres:
    image: postgres:16-alpine
    container_name: investiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: investiq
      POSTGRES_PASSWORD: investiq
      POSTGRES_DB: investiq
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investiq -d investiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: investiq-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: investiq-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # These override .env so DB/Redis resolve to in-network hostnames, not localhost.
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://investiq:investiq@postgres:5432/investiq
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-only-change-me
      JWT_ALGORITHM: RS256
      JWT_KID: dev
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt_dev_private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_dev_public.pem
      # Transactional email (SMTP) — left to .env so local values are not
      # shadowed. Uncomment + set here only to override .env in this container.
      # SMTP_HOST:
      # SMTP_PORT:
      # SMTP_USERNAME:
      # SMTP_PASSWORD:
      # SMTP_FROM_EMAIL:
      # SMTP_USE_TLS:
      # Password reset tuning (kept in .env; uncomment to override here).
      # PASSWORD_RESET_TOKEN_EXPIRES_MINUTES:
      # PASSWORD_RESET_RATE_LIMIT_MAX:
      # PASSWORD_RESET_RATE_LIMIT_WINDOW_SECONDS:
      # APP_PUBLIC_BASE_URL:
    volumes:
      - ./keys:/app/keys:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
