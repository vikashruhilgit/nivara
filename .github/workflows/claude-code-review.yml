name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        # Advisory reviewer: an infra timeout / rate-limit must not block merges.
        # The review still posts its comments; the job just won't fail the PR.
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request for the InvestIQ codebase. Focus on:
            - Correctness and potential bugs
            - Security (auth is bearer-token only; never reintroduce cookies/CSRF;
              never log secrets or raw broker tokens)
            - Adherence to CLAUDE.md conventions (async-first I/O, settings via
              get_settings(), idempotency key = (broker_connection_id, instrument_id))
            - Test coverage for new code (target >=80%)
            Be concise. Leave inline comments for specific issues and a short summary.
          # --max-turns 15 was too low: Opus at --effort high exhausted it on
          # multi-file diffs and returned error_max_turns (hard CI failure).
          # Raise the budget and pre-allow read tools so the reviewer doesn't
          # waste turns on permission denials.
          claude_args: "--model claude-opus-4-8 --effort high --max-turns 40 --allowed-tools Bash,Read,Grep,Glob"
