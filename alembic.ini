# Alembic config for InvestIQ backend.
# Database URL is resolved at runtime from backend.app.config.get_settings().

[alembic]
script_location = backend/alembic
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is set programmatically in env.py from Settings — leave empty here
sqlalchemy.url =

[post_write_hooks]
# Optional: format generated migrations with ruff
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
